<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">

    <title>Pokemon</title>
</head>

<body>

    <nav class="navbar bg-danger">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-white">Pokemon search</span>
        </div>
    </nav>

    <div class="text-center mt-4">
        <h1>Bienvenido</h1>
        <h2>Pokeapi</h2>
    </div>

    <div id="pokemon-or-number" class="container mt-4">
        <div class="text-center">
            <label>Indica el nombre o id del pokemon</label>
            <input id="pokemon" type="text" class="form-control text-center">
            <small>id max = 1025</small>
            <br>
            <button class="btn btn-warning" onclick="baseURL()">Buscar</button>
        </div>
    </div>

    <div id="poke-table" class="container mb-4">
        <div class="row">

            <!-- Imagen -->
            <div class="col-12 text-center mb-4">
                <img src="" alt="imagen???" id="image">
            </div>

            <!-- Nombre -->
            <div class="col-6 text-center">
                <p>Nombre</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue0"></p>
            </div>

            <!-- ID -->
            <div class="col-6 text-center">
                <p>ID</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue1"></p>
            </div>

            <!-- Experiencia -->
            <div class="col-6 text-center">
                <p>Experiencia</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue2"></p>
            </div>

            <!-- Altura -->
            <div class="col-6 text-center">
                <p>Altura</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue3"></p>
            </div>

        </div>
    </div>

    <script src="../js/main.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
